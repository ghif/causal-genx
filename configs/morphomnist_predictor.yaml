version: "1"
seed: 7
dataset:
  name: morphomnist
  root: gs://medical-airnd/causal-gen/datasets/morphomnist
  input_res: 32
  pad: 4
  context_norm: "[-1,1]"
causal_schema:
  version: "1"
  variables: [thickness, intensity, digit]
  edges: [[digit, thickness], [thickness, intensity]]
model:
  name: hierarchical_vae
  context_dim: 12
optimizer:
  lr: 0.0001
  weight_decay: 0.1
  batch_size: 32
runtime:
  accelerator: cpu
  precision: fp32
artifacts:
  root: checkpoints
  run_name: predictor_jax-cpu-v2_23-07-2026
  remote_root: gs://medical-airnd/causal-gen/checkpoints
workflow:
  type: train-predictor
  predictor_model: morphomnist_image_parent_predictor
  epochs: 1000
  speed_log_freq: 50
  execution_mode: auto
  drop_remainder: true
  # Checkpoints remain best-validation-loss only, evaluated every N completed epochs.
  checkpoint_freq: 1
