version: "1"
seed: 7
dataset:
  name: morphomnist
  root: gs://medical-airnd/causal-gen/datasets/morphomnist
  input_res: 32
  pad: 4
  context_norm: "[-1,1]"
causal_schema:
  version: "1"
  variables: [thickness, intensity, digit]
  edges: [[digit, thickness], [thickness, intensity]]
model:
  name: hierarchical_vae
  context_dim: 12
optimizer:
  lr: 0.001
  weight_decay: 0.01
  batch_size: 1
runtime:
  accelerator: cpu
  precision: fp32
artifacts:
  root: checkpoints
  run_name: hvae_jax-cpu_22-07-2026_inference
workflow:
  type: infer
  checkpoint: gs://medical-airnd/causal-gen/checkpoints/morphomnist/hvae_jax-cpu_22-07-2026
  parents:
    thickness: 0.0
    intensity: 0.0
    digit: 0
  beta: 1.0
  # The historical GCS mirror has readable Orbax payloads without completion markers.
  trust_incomplete_checkpoint: true
