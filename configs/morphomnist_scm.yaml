version: "1"
seed: 7
dataset:
  name: morphomnist
  root: gs://medical-airnd/causal-gen/datasets/morphomnist
  input_res: 32
  pad: 4
  context_norm: "[-1,1]"
causal_schema:
  version: "1"
  variables: [thickness, intensity, digit]
  edges: [[digit, thickness], [thickness, intensity]]
model:
  name: hierarchical_vae
  context_dim: 12
optimizer:
  lr: 0.0001
  weight_decay: 0.1
  batch_size: 16
runtime:
  accelerator: cpu
  precision: fp32
artifacts:
  root: checkpoints
  run_name: scm_jax-cpu-v2_23-07-2026
  remote_root: gs://medical-airnd/causal-gen/checkpoints
workflow:
  type: train-scm
  scm_model: morphomnist_scm
  strict_artifact_contract: true
  epochs: 1000
  speed_log_freq: 500
  checkpoint_freq: 1
  plot_samples: 10000
  widths: [32, 32]
  benchmark_steps: 0
